<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/style.css') }}">
</head>

<body>

<div class="container">

<div class="login-box">

<h1>Student Performance Predictor</h1>

<form action="/login" method="POST">

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required>

    <button type="submit">
        Login
    </button>

</form>

<p>
    Don't have an account?
    <a href="/register">Register</a>
</p>

</div>

</div>

</body>
</html>
